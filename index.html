<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CPA Training">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d1117">
<title>CPA Training — 愛知県第18版</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=JetBrains+Mono:wght@700;800&display=swap" rel="stylesheet">
<script>
window.addEventListener('load',()=>{
  const m={name:"CPA Training 愛知県第18版",short_name:"CPA Training",start_url:"./",display:"standalone",background_color:"#0d1117",theme_color:"#0d1117",orientation:"any",icons:[{src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='40' fill='%230d1117'/%3E%3Cpath d='M40 96 L80 40 L96 70 L112 50 L152 96' stroke='%23ef4444' stroke-width='12' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E",sizes:"192x192",type:"image/svg+xml"}]};
  const b=new Blob([JSON.stringify(m)],{type:'application/json'});
  const l=document.createElement('link');l.rel='manifest';l.href=URL.createObjectURL(b);
  document.head.appendChild(l);
});
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#0d1117;}
body{font-family:'Noto Sans JP',sans-serif;color:#e2e8f0;overscroll-behavior:none;}
:root{
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
  --safe-left:env(safe-area-inset-left,0px);--safe-right:env(safe-area-inset-right,0px);
  --bg:#0d1117;--bg2:#111827;--bg3:#161d27;--bg4:#1e2a3a;
  --border:#1e2a3a;--accent:#2563eb;
  --text1:#f1f5f9;--text2:#94a3b8;--text3:#475569;
}
#root{position:fixed;inset:0;padding-top:var(--safe-top);padding-bottom:var(--safe-bottom);padding-left:var(--safe-left);padding-right:var(--safe-right);display:flex;flex-direction:column;background:var(--bg);}
::-webkit-scrollbar{width:4px;height:4px;}::-webkit-scrollbar-track{background:var(--bg3);}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px;}
.glass{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);backdrop-filter:blur(8px);}
input,select,textarea{font-family:'Noto Sans JP',sans-serif;background:#fff;color:#1e293b;border:1px solid #e2e8f0;border-radius:8px;outline:none;-webkit-appearance:none;font-size:14px;}
input:focus,select:focus,textarea:focus{border-color:#3b82f6;}
button{font-family:'Noto Sans JP',sans-serif;cursor:pointer;-webkit-user-select:none;user-select:none;touch-action:manipulation;}
button:active{opacity:0.75;}
#header{background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;}
.header-top{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 8px;border-bottom:1px solid var(--border);gap:8px;flex-wrap:wrap;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{background:#dc2626;border-radius:10px;padding:7px 9px;display:flex;align-items:center;justify-content:center;}
.logo-title{font-size:16px;font-weight:900;letter-spacing:0.08em;color:var(--text1);}
.logo-sub{font-size:10px;color:var(--text3);letter-spacing:0.05em;}
.header-btns{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.btn{display:flex;align-items:center;gap:5px;padding:9px 14px;border-radius:10px;font-size:12px;font-weight:700;border:none;transition:opacity 0.15s;min-height:40px;white-space:nowrap;}
.btn-primary{background:#2563eb;color:#fff;}
.btn-success{background:#059669;color:#fff;}
.btn-ghost{background:rgba(255,255,255,0.07);color:#cbd5e1;border:1px solid rgba(255,255,255,0.1)!important;}
.sep{width:1px;height:28px;background:var(--border);margin:0 2px;}
.tabs{display:flex;gap:4px;padding:0 16px;background:var(--bg);}
.tab{display:flex;align-items:center;gap:7px;padding:11px 20px;font-size:12px;font-weight:700;letter-spacing:0.05em;background:transparent;border:none;color:var(--text3);border-bottom:2px solid transparent;transition:all 0.15s;}
.tab.active{color:#60a5fa;border-bottom-color:#3b82f6;}
#main{flex:1;overflow:hidden;padding:12px;display:flex;flex-direction:column;}
.tab-panel{display:flex;flex:1;gap:12px;overflow:hidden;}
.tab-panel.hidden{display:none!important;}
.col{display:flex;flex-direction:column;overflow:hidden;border-radius:14px;}
.col-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.sec-hd{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--border);flex-shrink:0;}
.sec-hd-title{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:800;letter-spacing:0.05em;color:var(--text1);}
.fg{display:flex;flex-direction:column;gap:4px;}
.fg label{font-size:10px;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);}
.fg input,.fg select{padding:9px 10px;font-size:13px;}
#period-table{width:100%;border-collapse:collapse;font-size:12px;}
#period-table th{padding:8px 6px;font-size:10px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;color:var(--text3);text-align:center;background:var(--bg3);border-bottom:1px solid var(--border);}
#period-table td{padding:4px;border-bottom:1px solid var(--border);}
#period-table tr:last-child td{border-bottom:none;}
#period-table td:first-child{padding:6px 8px;font-size:11px;font-weight:700;color:var(--text3);background:var(--bg3);text-align:center;white-space:nowrap;}
#period-table input,#period-table select{font-size:12px;padding:6px 4px;border-radius:6px;width:100%;}
.timer-box{background:var(--bg3);border-radius:14px;padding:14px 16px;border:1px solid var(--border);flex-shrink:0;}
.timer-display{font-family:'JetBrains Mono',monospace;font-size:32px;font-weight:800;color:var(--text1);letter-spacing:3px;}
.round-btn{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:none;flex-shrink:0;}
@keyframes pulse-ring{0%{box-shadow:0 0 0 0 rgba(59,130,246,0.5);}70%{box-shadow:0 0 0 10px rgba(59,130,246,0);}100%{box-shadow:0 0 0 0 rgba(59,130,246,0);}}
.metro-on{animation:pulse-ring 0.55s ease-out infinite;}
.cat-hd{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;background:var(--bg3);border-bottom:1px solid var(--border);}
.cat-hd input{background:transparent;border:none;outline:none;font-size:10px;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);flex:1;font-family:'Noto Sans JP',sans-serif;}
.eval-item{display:flex;align-items:flex-start;gap:8px;padding:9px 12px;border-bottom:1px solid rgba(255,255,255,0.03);transition:background 0.1s;}
.eval-item.is-o{background:rgba(16,185,129,0.07);}
.eval-item.is-x{background:rgba(239,68,68,0.07);}
.eval-btn{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;border:2px solid var(--bg4);background:transparent;color:var(--bg4);flex-shrink:0;transition:all 0.15s;}
.eval-btn.active-o{background:#16a34a;border-color:#16a34a;color:#fff;}
.eval-btn.active-x{background:#dc2626;border-color:#dc2626;color:#fff;}
.eval-label{flex:1;font-size:12px;color:var(--text2);background:transparent;border:none;outline:none;resize:none;line-height:1.5;font-family:'Noto Sans JP',sans-serif;cursor:pointer;padding:2px 4px;border-radius:4px;-webkit-user-select:none;user-select:none;}
.eval-label.is-o{color:#6ee7b7;font-weight:700;}
.eval-label.is-x{color:#fca5a5;font-weight:700;}
.eval-label.edit-mode{cursor:text;-webkit-user-select:text;user-select:text;border:1px solid #1e3a8a;}
.add-row-btn{width:100%;padding:9px;background:rgba(37,99,235,0.07);border:1px dashed #1e3a8a;border-radius:8px;color:#3b82f6;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:5px;margin:4px 0;}
.add-cat-btn{width:100%;padding:11px;background:var(--bg3);border:1px dashed var(--bg4);border-radius:10px;color:var(--text3);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:5px;}
canvas{touch-action:none;cursor:crosshair;display:block;}
.rate-display{font-family:'JetBrains Mono',monospace;font-size:56px;font-weight:800;letter-spacing:2px;line-height:1;}
.overlay{position:fixed;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.75);padding:16px;}
.modal{background:var(--bg2);border-radius:18px;padding:24px;border:1px solid var(--border);box-shadow:0 25px 60px rgba(0,0,0,0.6);width:100%;max-width:580px;max-height:85vh;display:flex;flex-direction:column;}
#free-memo{width:100%;background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:10px;font-size:13px;color:#1e293b;font-family:'JetBrains Mono',monospace;line-height:1.6;resize:none;outline:none;min-height:90px;}
svg{flex-shrink:0;}
@media(orientation:landscape){.header-top{padding:6px 16px;}.btn{padding:7px 12px;min-height:36px;}.tab{padding:8px 16px;}#main{padding:8px;}.timer-display{font-size:26px;}}
@media(max-width:820px){.logo-title{font-size:14px;}.btn{font-size:11px;padding:8px 10px;}.header-btns{gap:4px;}}
</style>
</head>
<body>
<div id="root">
  <div id="header">
    <div class="header-top">
      <div class="logo">
        <div class="logo-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
        <div><div class="logo-title">CPA TRAINING</div><div class="logo-sub">愛知県第18版 シミュレーション記録</div></div>
      </div>
      <div class="header-btns">
        <button class="btn btn-ghost" onclick="openModal()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>記録一覧</button>
        <button class="btn btn-primary" onclick="saveRecord()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>保存</button>
        <div class="sep"></div>
        <input type="file" id="file-input" accept=".txt,.json" style="display:none" onchange="importFile(event)">
        <button class="btn btn-ghost" onclick="document.getElementById('file-input').click()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>読込</button>
        <button class="btn btn-ghost" onclick="exportData()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>書出</button>
        <div class="sep"></div>
        <button class="btn btn-success" onclick="exportPDF()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>PDF出力</button>
        <button class="btn btn-ghost" onclick="resetAll()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.95"/></svg>リセット</button>
      </div>
    </div>
    <div class="tabs">
      <button class="tab active" id="tab-scenario" onclick="switchTab('scenario')"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>想定票（入力）</button>
      <button class="tab" id="tab-result" onclick="switchTab('result')"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>結果レポート</button>
    </div>
  </div>
  <div id="main">
    <div class="tab-panel" id="panel-scenario">
      <div class="col glass" style="flex:1;">
        <div class="sec-hd"><div class="sec-hd-title"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>活動記録・傷病者情報</div></div>
        <div class="col-scroll" style="padding:14px;display:flex;flex-direction:column;gap:14px;">
          <div class="fg"><label>指令内容</label><input id="f-dispatch" type="text" style="padding:10px;font-size:14px;"></div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;">
            <div class="fg"><label>年齢</label><input id="f-age" type="text" style="padding:9px;"></div>
            <div class="fg"><label>性別</label><select id="f-sex" style="padding:9px;background:#fff;"><option>男</option><option>女</option></select></div>
            <div class="fg"><label>目撃</label><select id="f-witness" style="padding:9px;background:#fff;"><option>有</option><option>無</option></select></div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;">
            <div class="fg"><label>原因(推定)</label><input id="f-cause" type="text" style="padding:9px;"></div>
            <div class="fg"><label>既往歴</label><input id="f-pmh" type="text" style="padding:9px;"></div>
            <div class="fg"><label>かかりつけ</label><input id="f-hospital" type="text" style="padding:9px;"></div>
          </div>
          <div style="border:1px solid var(--border);border-radius:12px;overflow:hidden;">
            <table id="period-table"><thead><tr><th>時期</th><th>波形</th><th>特記事項</th><th>換気</th><th>ETCO2</th><th>予想される活動</th></tr></thead><tbody id="period-tbody"></tbody></table>
          </div>
          <div class="timer-box">
            <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;">
              <div style="display:flex;align-items:center;gap:12px;">
                <div style="background:#2563eb;border-radius:12px;padding:10px;display:flex;"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
                <div><div style="font-size:10px;font-weight:800;color:var(--text3);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:3px;">活動経過時間</div><div class="timer-display" id="timer-display">00分00秒</div></div>
              </div>
              <div style="display:flex;gap:8px;">
                <button id="timer-toggle" class="round-btn" style="background:#16a34a;" onclick="toggleTimer()"><svg id="timer-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg></button>
                <button class="round-btn" style="background:var(--bg4);border:1px solid #334155;" onclick="resetTimer()"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.95"/></svg></button>
              </div>
            </div>
            <div style="border-top:1px solid var(--border);margin-top:12px;padding-top:12px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;">
              <div style="display:flex;align-items:center;gap:7px;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg><span style="font-size:11px;font-weight:700;color:var(--text2);">メトロノーム（胸骨圧迫テンポ）</span></div>
              <div style="display:flex;align-items:center;gap:10px;">
                <input type="range" id="bpm-slider" min="100" max="120" value="110" style="width:90px;accent-color:#3b82f6;background:transparent;border:none;" oninput="updateBpm(this.value)">
                <span id="bpm-label" style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);width:60px;text-align:right;">110 BPM</span>
                <button id="metro-btn" onclick="toggleMetronome()" style="padding:9px 16px;border-radius:10px;font-size:11px;font-weight:800;background:var(--bg4);color:var(--text3);border:none;min-height:38px;min-width:56px;">OFF</button>
              </div>
            </div>
          </div>
          <button onclick="addLap()" style="width:100%;padding:11px;background:var(--bg3);border:1px dashed var(--bg4);border-radius:10px;color:var(--text3);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:5px;min-height:44px;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>現在の経過時間をメモに追記</button>
          <div class="fg"><label>フリーメモ・活動ログ</label><textarea id="free-memo" rows="4" placeholder="タイマーの記録がここに反映されます..."></textarea></div>
        </div>
      </div>
      <div style="width:42%;display:flex;flex-direction:column;gap:12px;overflow:hidden;">
        <div class="col glass" style="flex:1;">
          <div class="sec-hd" style="background:#1d3a6e;border-bottom:1px solid #1e3a8a;">
            <div style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:800;letter-spacing:0.05em;color:#e0f2fe;text-transform:uppercase;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#93c5fd" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>活動評価チェックリスト</div>
            <button id="edit-mode-btn" onclick="toggleEditMode()" style="padding:7px 12px;border-radius:8px;font-size:10px;font-weight:800;background:rgba(255,255,255,0.1);color:#bfdbfe;border:none;display:flex;align-items:center;gap:4px;min-height:36px;"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/></svg>項目を編集</button>
          </div>
          <div class="col-scroll" id="checklist-container"></div>
        </div>
        <div class="glass" style="border-radius:14px;padding:12px;flex-shrink:0;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
            <span style="font-size:10px;font-weight:800;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;display:flex;align-items:center;gap:5px;"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/></svg>手書きメモ</span>
            <button onclick="clearCanvas()" style="background:none;border:none;color:var(--text3);display:flex;padding:8px;min-width:38px;min-height:38px;align-items:center;justify-content:center;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20H7L3 16l10-10 7 7-3.5 3.5"/><path d="M6.5 17.5l-4-4"/></svg></button>
          </div>
          <div style="background:#fff;border-radius:10px;height:160px;overflow:hidden;border:1px solid #e2e8f0;"><canvas id="canvas-scenario" style="width:100%;height:100%;"></canvas></div>
        </div>
      </div>
    </div>
    <div class="tab-panel hidden" id="panel-result">
      <div class="col glass" style="width:35%;">
        <div class="sec-hd" style="background:#1a0a0a;border-bottom:1px solid #3b1111;"><div style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:800;letter-spacing:0.05em;color:#fecaca;text-transform:uppercase;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>要改善項目 (×判定)</div></div>
        <div class="col-scroll" style="padding:14px;display:flex;flex-direction:column;">
          <div id="x-items-list" style="flex:1;"></div>
          <div style="margin-top:20px;padding:20px;background:var(--bg3);border-radius:16px;text-align:center;border:1px solid var(--border);">
            <div style="font-size:10px;font-weight:800;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;">達成率 (○の割合)</div>
            <div class="rate-display" id="rate-display">0%</div>
            <div style="font-size:12px;color:var(--text3);margin-top:6px;" id="rate-sub">0 / 0 項目達成</div>
          </div>
        </div>
      </div>
      <div class="col glass" style="flex:1;">
        <div class="sec-hd" style="background:#0f172a;border-bottom:1px solid var(--border);">
          <div style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:800;letter-spacing:0.05em;color:#e2e8f0;text-transform:uppercase;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/></svg>手書きメモ・フィードバック</div>
          <button onclick="clearCanvas()" style="display:flex;align-items:center;gap:5px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:8px;padding:9px 14px;color:var(--text3);font-size:11px;font-weight:700;min-height:38px;"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20H7L3 16l10-10 7 7-3.5 3.5"/><path d="M6.5 17.5l-4-4"/></svg>クリア</button>
        </div>
        <div style="flex:1;padding:16px;display:flex;flex-direction:column;overflow:hidden;">
          <div style="flex:1;background:#fff;border-radius:18px;overflow:hidden;border:2px solid #f1f5f9;"><canvas id="canvas-result" style="width:100%;height:100%;"></canvas></div>
          <div style="margin-top:10px;display:flex;justify-content:space-between;font-size:10px;font-weight:700;color:var(--bg4);font-style:italic;"><span>※想定票タブの内容が自動で同期されます</span><span>愛知県救急隊シミュレーション記録</span></div>
        </div>
      </div>
    </div>
  </div>
  <div class="overlay" id="modal-records" style="display:none;">
    <div class="modal">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <h3 style="font-size:16px;font-weight:800;color:var(--text1);display:flex;align-items:center;gap:8px;"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>保存された記録一覧</h3>
        <button onclick="closeModal()" style="background:none;border:none;color:var(--text3);display:flex;min-width:44px;min-height:44px;align-items:center;justify-content:center;"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <div id="records-list" style="flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;"></div>
    </div>
  </div>
  <div class="overlay" id="modal-confirm" style="display:none;z-index:70;">
    <div class="modal" style="max-width:340px;">
      <p id="confirm-msg" style="font-size:14px;font-weight:600;color:var(--text1);text-align:center;margin-bottom:24px;white-space:pre-wrap;line-height:1.7;"></p>
      <div style="display:flex;justify-content:center;gap:12px;">
        <button id="confirm-cancel" onclick="closeConfirm()" style="padding:13px 28px;font-size:14px;font-weight:700;color:#94a3b8;background:var(--bg4);border:1px solid #334155;border-radius:12px;min-height:52px;">キャンセル</button>
        <button id="confirm-ok" onclick="confirmOK()" style="padding:13px 28px;font-size:14px;font-weight:700;color:#fff;background:#dc2626;border:none;border-radius:12px;min-height:52px;">OK</button>
      </div>
    </div>
  </div>
  <div class="overlay" id="modal-prompt" style="display:none;z-index:70;">
    <div class="modal" style="max-width:400px;">
      <h3 id="prompt-title" style="font-size:14px;font-weight:700;color:var(--text1);margin-bottom:12px;"></h3>
      <input id="prompt-input" type="text" style="width:100%;padding:13px 14px;border-radius:12px;border:1px solid #1e3a8a;background:var(--bg4);color:var(--text1);font-size:15px;margin-bottom:20px;">
      <div style="display:flex;justify-content:flex-end;gap:10px;">
        <button onclick="closePrompt()" style="padding:13px 22px;font-size:14px;font-weight:700;color:#94a3b8;background:var(--bg4);border:1px solid #334155;border-radius:12px;min-height:52px;">キャンセル</button>
        <button onclick="promptOK()" style="padding:13px 22px;font-size:14px;font-weight:700;color:#fff;background:#2563eb;border:none;border-radius:12px;min-height:52px;">保存</button>
      </div>
    </div>
  </div>
</div>
<script>
const PL=['初期','P1終了','P2終了','P3終了','P4終了','P5終了'];
const LS='cpa_v3';
let S={activeTab:'scenario',evaluation:{},isEditMode:false,time:0,isRunning:false,metronomeOn:false,bpm:110,canvasDataUrl:null,cats:[{id:'cat_pre',title:'接触前',items:[]},{id:'cat_p1',title:'1ピリオド',items:[]},{id:'cat_p2',title:'2ピリオド',items:[]},{id:'cat_p3',title:'3ピリオド',items:[]},{id:'cat_p4',title:'4ピリオド',items:[]},{id:'cat_p5',title:'5ピリオド',items:[]}]};
let tInt=null,mInt=null,actx=null,drawing=false,confCB=null,promCB=null;
const gSaved=()=>{try{return JSON.parse(localStorage.getItem(LS)||'[]');}catch{return[];}};
const sSaved=a=>localStorage.setItem(LS,JSON.stringify(a));
const fmt=s=>`${String(Math.floor(s/60)).padStart(2,'0')}分${String(s%60).padStart(2,'0')}秒`;
document.addEventListener('DOMContentLoaded',()=>{
  buildTable();renderCL();
  document.addEventListener('touchmove',e=>{if(e.touches.length>1)e.preventDefault();},{passive:false});
  let lt=0;document.addEventListener('touchend',e=>{const n=Date.now();if(n-lt<300)e.preventDefault();lt=n;},{passive:false});
  setTimeout(()=>{iC('canvas-scenario',160);iC('canvas-result');},150);
  ['canvas-scenario','canvas-result'].forEach(attachC);
  document.getElementById('prompt-input').addEventListener('keydown',e=>{if(e.key==='Enter')promptOK();});
  document.getElementById('modal-records').addEventListener('click',function(e){if(e.target===this)closeModal();});
});
function switchTab(t){S.activeTab=t;['scenario','result'].forEach(k=>{document.getElementById('panel-'+k).classList.toggle('hidden',k!==t);document.getElementById('tab-'+k).classList.toggle('active',k===t);});if(t==='result'){updRes();setTimeout(()=>iC('canvas-result'),80);}}
function buildTable(){const tb=document.getElementById('period-tbody');tb.innerHTML='';PL.forEach((_,i)=>{const tr=document.createElement('tr');tr.innerHTML=`<td>${PL[i]}</td><td><select id="p-r${i}" style="text-align:center;font-weight:700;color:#2563eb;"><option value=""></option><option>Vf</option><option>VT</option><option>PEA</option><option>心静止</option><option>NSR</option></select></td><td><input type="text" id="p-n${i}" placeholder="特記事項" style="min-width:80px;"></td><td><input type="text" id="p-v${i}" style="text-align:center;max-width:60px;"></td><td><input type="text" id="p-e${i}" style="text-align:center;font-family:'JetBrains Mono',monospace;font-weight:700;color:#2563eb;max-width:60px;"></td><td><input type="text" id="p-a${i}" placeholder="例: 気道確保…" style="min-width:100px;"></td>`;tb.appendChild(tr);});}
function gP(){return PL.map((_,i)=>({rhythm:document.getElementById('p-r'+i)?.value||'',notes:document.getElementById('p-n'+i)?.value||'',vent:document.getElementById('p-v'+i)?.value||'',etco2:document.getElementById('p-e'+i)?.value||'',expectedAction:document.getElementById('p-a'+i)?.value||''}));}
function sP(ps=[]){ps.forEach((p,i)=>{const s=(id,v)=>{const el=document.getElementById(id);if(el)el.value=v||'';};s('p-r'+i,p.rhythm);s('p-n'+i,p.notes);s('p-v'+i,p.vent);s('p-e'+i,p.etco2);s('p-a'+i,p.expectedAction);});}
function updTD(){document.getElementById('timer-display').textContent=fmt(S.time);}
function toggleTimer(){S.isRunning=!S.isRunning;const b=document.getElementById('timer-toggle'),ic=document.getElementById('timer-icon');if(S.isRunning){b.style.background='#dc2626';ic.innerHTML='<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';tInt=setInterval(()=>{S.time++;updTD();},1000);}else{b.style.background='#16a34a';ic.innerHTML='<polygon points="5 3 19 12 5 21 5 3"/>';clearInterval(tInt);}}
function resetTimer(){clearInterval(tInt);S.isRunning=false;S.time=0;updTD();document.getElementById('timer-toggle').style.background='#16a34a';document.getElementById('timer-icon').innerHTML='<polygon points="5 3 19 12 5 21 5 3"/>';}
function addLap(){const m=document.getElementById('free-memo');m.value+=(m.value?'\n':'')+'記録時間: '+fmt(S.time);}
function pClick(){if(!actx)return;const o=actx.createOscillator(),g=actx.createGain();o.connect(g);g.connect(actx.destination);o.frequency.value=880;o.type='sine';g.gain.setValueAtTime(1,actx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.1);o.start(actx.currentTime);o.stop(actx.currentTime+0.1);}
function toggleMetronome(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();if(actx.state==='suspended')actx.resume();S.metronomeOn=!S.metronomeOn;const b=document.getElementById('metro-btn');if(S.metronomeOn){b.textContent='ON';b.style.background='#2563eb';b.style.color='#fff';b.classList.add('metro-on');pClick();mInt=setInterval(pClick,60000/S.bpm);}else{b.textContent='OFF';b.style.background='var(--bg4)';b.style.color='var(--text3)';b.classList.remove('metro-on');clearInterval(mInt);}}
function updateBpm(v){S.bpm=Number(v);document.getElementById('bpm-label').textContent=v+' BPM';if(S.metronomeOn){clearInterval(mInt);mInt=setInterval(pClick,60000/S.bpm);}}
function iC(id,fh){const c=document.getElementById(id);if(!c)return;const p=c.parentElement;if(!p)return;c.width=p.clientWidth||300;c.height=fh||(p.clientHeight||400);const ctx=c.getContext('2d');ctx.lineCap='round';ctx.lineWidth=3;ctx.strokeStyle='#1e293b';ctx.clearRect(0,0,c.width,c.height);if(S.canvasDataUrl){const img=new Image();img.onload=()=>ctx.drawImage(img,0,0,c.width,c.height);img.src=S.canvasDataUrl;}}
function gC(e,c){const r=c.getBoundingClientRect(),sx=c.width/r.width,sy=c.height/r.height;if(e.touches&&e.touches[0])return{x:(e.touches[0].clientX-r.left)*sx,y:(e.touches[0].clientY-r.top)*sy};return{x:(e.clientX-r.left)*sx,y:(e.clientY-r.top)*sy};}
function attachC(id){document.addEventListener('DOMContentLoaded',()=>{const c=document.getElementById(id);if(!c)return;const st=e=>{e.preventDefault();const{x,y}=gC(e,c);const ctx=c.getContext('2d');ctx.lineCap='round';ctx.lineWidth=3;ctx.strokeStyle='#1e293b';ctx.beginPath();ctx.moveTo(x,y);drawing=true;};const mv=e=>{if(!drawing)return;e.preventDefault();const{x,y}=gC(e,c);const ctx=c.getContext('2d');ctx.lineTo(x,y);ctx.stroke();};const en=()=>{if(!drawing)return;drawing=false;S.canvasDataUrl=c.toDataURL();const o=id==='canvas-scenario'?'canvas-result':'canvas-scenario';setTimeout(()=>iC(o),30);};c.addEventListener('mousedown',st);c.addEventListener('mousemove',mv);c.addEventListener('mouseup',en);c.addEventListener('mouseleave',en);c.addEventListener('touchstart',st,{passive:false});c.addEventListener('touchmove',mv,{passive:false});c.addEventListener('touchend',en);});}
function clearCanvas(){showConfirm('手書き内容を消去しますか？',()=>{S.canvasDataUrl=null;['canvas-scenario','canvas-result'].forEach(id=>{const c=document.getElementById(id);if(c)c.getContext('2d').clearRect(0,0,c.width,c.height);});});}
function toggleEditMode(){S.isEditMode=!S.isEditMode;const b=document.getElementById('edit-mode-btn');if(S.isEditMode){b.style.background='#f0f9ff';b.style.color='#1d4ed8';b.innerHTML='<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> 編集完了';}else{b.style.background='rgba(255,255,255,0.1)';b.style.color='#bfdbfe';b.innerHTML='<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/></svg> 項目を編集';}renderCL();}
function renderCL(){const con=document.getElementById('checklist-container');con.innerHTML='';S.cats.forEach((cat,ci)=>{const hd=document.createElement('div');hd.className='cat-hd';const inp=document.createElement('input');inp.value=cat.title;inp.placeholder=S.isEditMode?'大項目を入力':'';inp.readOnly=!S.isEditMode;inp.oninput=e=>S.cats[ci].title=e.target.value;hd.appendChild(inp);if(S.isEditMode){const d=mk('button','background:none;border:none;color:var(--text3);display:flex;padding:8px;min-width:36px;min-height:36px;align-items:center;justify-content:center;','<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>');d.onclick=()=>rmCat(ci);hd.appendChild(d);}con.appendChild(hd);if(cat.items.length===0&&!S.isEditMode){const e=document.createElement('div');e.style.cssText='padding:10px 14px;font-size:11px;color:var(--text3);text-align:center;font-style:italic;';e.textContent='項目がありません。「項目を編集」から追加してください。';con.appendChild(e);}cat.items.forEach((item,ii)=>{const row=document.createElement('div');row.className='eval-item';const st=S.evaluation[item.id];if(st==='O')row.classList.add('is-o');if(st==='X')row.classList.add('is-x');const ba=document.createElement('div');ba.style.cssText='display:flex;gap:6px;flex-shrink:0;margin-top:2px;';['O','X'].forEach(v=>{const b=document.createElement('button');b.className='eval-btn'+(st===v?(v==='O'?' active-o':' active-x'):'');b.textContent=v==='O'?'○':'×';b.onclick=()=>{sEval(item.id,v);renderCL();if(S.activeTab==='result')updRes();};ba.appendChild(b);});const lbl=document.createElement('textarea');lbl.className='eval-label'+(st==='O'?' is-o':st==='X'?' is-x':'')+(S.isEditMode?' edit-mode':'');lbl.value=item.label;lbl.rows=1;lbl.readOnly=!S.isEditMode;lbl.placeholder=S.isEditMode?'評価項目を入力':'';lbl.style.height='auto';lbl.oninput=e=>{e.target.style.height='auto';e.target.style.height=e.target.scrollHeight+'px';S.cats[ci].items[ii].label=e.target.value;};if(!S.isEditMode)lbl.onclick=()=>{cycleEval(item.id);renderCL();if(S.activeTab==='result')updRes();};setTimeout(()=>{lbl.style.height='auto';lbl.style.height=lbl.scrollHeight+'px';},0);row.appendChild(ba);row.appendChild(lbl);if(S.isEditMode){const d=mk('button','background:none;border:none;color:var(--text3);display:flex;padding:8px;min-width:36px;min-height:36px;align-items:center;justify-content:center;flex-shrink:0;','<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>');d.onclick=()=>rmItem(ci,ii);row.appendChild(d);}con.appendChild(row);});if(S.isEditMode){const w=document.createElement('div');w.style.cssText='padding:6px 10px;';const b=mk('button','width:100%;padding:9px;background:rgba(37,99,235,0.07);border:1px dashed #1e3a8a;border-radius:8px;color:#3b82f6;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:5px;margin:4px 0;','<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg> 評価項目を追加');b.onclick=()=>addItem(ci);w.appendChild(b);con.appendChild(w);}});if(S.isEditMode){const w=document.createElement('div');w.style.cssText='padding:10px;border-top:1px solid var(--border);';const b=mk('button','width:100%;padding:11px;background:var(--bg3);border:1px dashed var(--bg4);border-radius:10px;color:var(--text3);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:5px;','<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg> 大項目（カテゴリ）を追加');b.onclick=addCat;w.appendChild(b);con.appendChild(w);}}
function mk(tag,css,html){const el=document.createElement(tag);el.style.cssText=css;el.innerHTML=html;return el;}
function sEval(id,v){S.evaluation[id]=S.evaluation[id]===v?undefined:v;}
function cycleEval(id){const c=S.evaluation[id];if(c==='O')S.evaluation[id]='X';else if(c==='X')delete S.evaluation[id];else S.evaluation[id]='O';}
function addItem(ci){S.cats[ci].items.push({id:'i'+Date.now()+Math.random().toString(36).slice(2,7),label:''});renderCL();}
function rmItem(ci,ii){showConfirm('この項目を削除しますか？',()=>{S.cats[ci].items.splice(ii,1);renderCL();});}
function addCat(){S.cats.push({id:'c'+Date.now()+Math.random().toString(36).slice(2,7),title:'',items:[]});renderCL();}
function rmCat(ci){showConfirm('この大項目と含まれるすべての評価項目を削除しますか？',()=>{S.cats.splice(ci,1);renderCL();});}
function updRes(){const tot=S.cats.reduce((s,c)=>s+c.items.length,0);const oC=S.cats.reduce((s,c)=>s+c.items.filter(i=>S.evaluation[i.id]==='O').length,0);const rate=tot===0?0:Math.round((oC/tot)*100);const rd=document.getElementById('rate-display');rd.textContent=rate+'%';rd.style.color=rate>=80?'#34d399':rate>=60?'#fbbf24':'#f87171';document.getElementById('rate-sub').textContent=oC+' / '+tot+' 項目達成';const list=document.getElementById('x-items-list');list.innerHTML='';const xC=S.cats.filter(c=>c.items.some(i=>S.evaluation[i.id]==='X'));if(!xC.length){list.innerHTML='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:160px;color:var(--text3);"><svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="rgba(16,185,129,0.3)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:10px;"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg><p style="font-size:12px;font-weight:700;">×判定された項目はありません</p></div>';return;}xC.forEach(cat=>{const ce=document.createElement('div');ce.style.cssText='margin-bottom:14px;';ce.innerHTML='<div style="font-size:10px;font-weight:800;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;border-bottom:1px solid var(--border);padding-bottom:4px;margin-bottom:8px;">'+cat.title+'</div>';cat.items.filter(i=>S.evaluation[i.id]==='X').forEach(item=>{const r=document.createElement('div');r.style.cssText='display:flex;align-items:flex-start;gap:8px;padding:4px 0;';r.innerHTML='<span style="color:#ef4444;font-weight:800;font-size:14px;width:16px;text-align:center;flex-shrink:0;">×</span><span style="font-size:12px;color:#fca5a5;font-weight:600;line-height:1.5;">'+item.label+'</span>';ce.appendChild(r);});list.appendChild(ce);});}
function gF(){return{dispatch:document.getElementById('f-dispatch').value,age:document.getElementById('f-age').value,sex:document.getElementById('f-sex').value,witness:document.getElementById('f-witness').value,cause:document.getElementById('f-cause').value,pmh:document.getElementById('f-pmh').value,hospital:document.getElementById('f-hospital').value,periods:gP(),freeMemo:document.getElementById('free-memo').value};}
function sF(d){const s=(id,v)=>{const el=document.getElementById(id);if(el)el.value=v||'';};s('f-dispatch',d.dispatch);s('f-age',d.age);s('f-sex',d.sex);s('f-witness',d.witness);s('f-cause',d.cause);s('f-pmh',d.pmh);s('f-hospital',d.hospital);s('free-memo',d.freeMemo);if(d.periods)sP(d.periods);}
function saveRecord(){const def=document.getElementById('f-dispatch').value||new Date().toLocaleDateString()+'の記録';showPrompt('保存する記録の名前を入力してください',def,name=>{const e={id:Date.now().toString(),name,timestamp:Date.now(),record:gF(),cats:JSON.parse(JSON.stringify(S.cats)),evaluation:Object.assign({},S.evaluation),time:S.time,canvasDataUrl:S.canvasDataUrl};sSaved([e,...gSaved()]);showAlert('記録を保存しました。');});}
function openModal(){const list=document.getElementById('records-list');const arr=gSaved();if(!arr.length){list.innerHTML='<div style="text-align:center;color:var(--text3);padding:40px 0;display:flex;flex-direction:column;align-items:center;gap:14px;"><svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="var(--bg4)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg><p style="font-size:13px;">保存された記録はありません</p></div>';}else{list.innerHTML='';arr.forEach(r=>{const row=document.createElement('div');row.style.cssText='border:1px solid var(--border);border-radius:12px;padding:13px 14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;background:var(--bg3);';row.innerHTML='<div><div style="font-size:11px;color:var(--text3);margin-bottom:3px;">'+new Date(r.timestamp).toLocaleString()+'</div><div style="font-weight:700;font-size:14px;color:var(--text1);">'+(r.name||r.record.dispatch||'無題の記録')+'<span style="font-size:12px;font-weight:400;color:var(--text3);margin-left:8px;">(年齢: '+(r.record.age||'-')+', 性別: '+r.record.sex+')</span></div></div><div style="display:flex;gap:8px;"><button onclick="loadRecord(\''+r.id+'\')" style="padding:11px 18px;background:rgba(37,99,235,0.15);color:#60a5fa;border:1px solid #1e3a8a;border-radius:10px;font-size:13px;font-weight:700;min-height:46px;">読み込む</button><button onclick="deleteRecord(\''+r.id+'\')" style="padding:10px;background:transparent;border:none;color:var(--text3);display:flex;align-items:center;justify-content:center;min-width:46px;min-height:46px;border-radius:10px;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg></button></div>';list.appendChild(row);});}document.getElementById('modal-records').style.display='flex';}
function closeModal(){document.getElementById('modal-records').style.display='none';}
function loadRecord(id){const r=gSaved().find(x=>x.id===id);if(!r)return;showConfirm('現在の編集内容を破棄して読み込みますか？',()=>{sF(r.record);S.cats=JSON.parse(JSON.stringify(r.cats||S.cats));S.evaluation=Object.assign({},r.evaluation||{});S.time=r.time||0;S.canvasDataUrl=r.canvasDataUrl||null;updTD();renderCL();closeModal();['canvas-scenario','canvas-result'].forEach(id=>iC(id));setTimeout(()=>showAlert('データを読み込みました。'),300);});}
function deleteRecord(id){showConfirm('この記録を削除しますか？',()=>{sSaved(gSaved().filter(r=>r.id!==id));openModal();});}
function exportData(){const d={record:gF(),cats:S.cats,evaluation:S.evaluation,time:S.time,canvasDataUrl:S.canvasDataUrl};const b=new Blob([JSON.stringify(d,null,2)],{type:'text/plain;charset=utf-8'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='CPA訓練データ_'+new Date().toISOString().slice(0,10).replace(/-/g,'')+'.txt';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);showAlert('データをファイルとして保存しました。');}
function importFile(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.record&&(d.cats||d.evalCategories)){showConfirm('ファイルからデータを読み込みますか？\n(現在の編集内容は上書きされます)',()=>{sF(d.record);S.cats=d.cats||d.evalCategories;S.evaluation=d.evaluation||{};S.time=d.time||0;S.canvasDataUrl=d.canvasDataUrl||null;updTD();renderCL();['canvas-scenario','canvas-result'].forEach(id=>iC(id));showAlert('データを復元しました。');});}else{showAlert('無効なデータ形式です。');}}catch{showAlert('ファイルの読み込みに失敗しました。');}e.target.value=null;};r.readAsText(f);}
function ldSc(src){return new Promise((res,rej)=>{if(document.querySelector('script[src="'+src+'"]')){res();return;}const s=document.createElement('script');s.src=src;s.onload=res;s.onerror=rej;document.head.appendChild(s);});}
async function exportPDF(){showAlert('PDFレポートを作成しています。少々お待ちください...');try{await ldSc('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js');await ldSc('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js');}catch{showAlert('PDF生成ライブラリの読み込みに失敗しました。');return;}const{jsPDF}=window.jspdf;const fd=gF();const oC=S.cats.reduce((s,c)=>s+c.items.filter(i=>S.evaluation[i.id]==='O').length,0);const tot=S.cats.reduce((s,c)=>s+c.items.length,0);const rate=tot===0?0:Math.round((oC/tot)*100);let ck='';S.cats.forEach(cat=>{ck+='<h3 style="font-size:13px;margin:10px 0 4px 0;border-bottom:1px solid #e2e8f0;padding-bottom:4px;">【'+cat.title+'】</h3>';if(!cat.items.length){ck+='<div style="font-size:13px;color:#94a3b8;font-style:italic;">(項目なし)</div>';}cat.items.forEach(item=>{const st=S.evaluation[item.id];const m=st==='O'?'<span style="color:#16a34a;font-weight:bold;width:20px;display:inline-block;text-align:center;">○</span>':st==='X'?'<span style="color:#dc2626;font-weight:bold;width:20px;display:inline-block;text-align:center;">×</span>':'<span style="color:#94a3b8;width:20px;display:inline-block;text-align:center;">-</span>';ck+='<div style="display:flex;align-items:flex-start;margin-bottom:4px;font-size:13px;padding-bottom:2px;">'+m+'<span style="flex:1;line-height:1.3;">'+item.label+'</span></div>';});});const con=document.createElement('div');con.style.cssText='position:absolute;left:-9999px;top:0;width:1400px;background:#fff;padding:30px;font-family:"Noto Sans JP",sans-serif;color:#333;';con.innerHTML='<h1 style="font-size:22px;border-bottom:2px solid #333;padding-bottom:8px;margin:0 0 10px 0;">救急活動訓練シミュレーション記録</h1><div style="text-align:right;font-size:12px;margin-bottom:15px;">出力日時: '+new Date().toLocaleString()+'</div><div style="display:flex;gap:30px;"><div style="flex:1;"><h2 style="font-size:15px;background:#f1f5f9;padding:4px 8px;margin:0 0 8px 0;border-left:4px solid #3b82f6;">■ 傷病者情報</h2><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:15px;font-size:13px;"><div><strong>指令内容:</strong> '+fd.dispatch+'</div><div><strong>年齢/性別:</strong> '+fd.age+' / '+fd.sex+'</div><div><strong>目撃:</strong> '+fd.witness+'</div><div><strong>原因(推定):</strong> '+fd.cause+'</div><div><strong>既往歴:</strong> '+fd.pmh+'</div><div><strong>かかりつけ:</strong> '+fd.hospital+'</div></div><h2 style="font-size:15px;background:#f1f5f9;padding:4px 8px;margin:0 0 8px 0;border-left:4px solid #3b82f6;">■ ピリオド経過</h2><table style="width:100%;border-collapse:collapse;margin-bottom:15px;text-align:left;"><thead><tr>'+['時期','波形','特記事項','換気','ETCO2','予想活動'].map(h=>'<th style="border:1px solid #cbd5e1;padding:6px;font-size:13px;background:#f8fafc;">'+h+'</th>').join('')+'</tr></thead><tbody>'+fd.periods.map((p,i)=>'<tr><td style="border:1px solid #cbd5e1;padding:6px;font-size:13px;">'+PL[i]+'</td><td style="border:1px solid #cbd5e1;padding:6px;font-size:13px;">'+p.rhythm+'</td><td style="border:1px solid #cbd5e1;padding:6px;font-size:13px;">'+p.notes+'</td><td style="border:1px solid #cbd5e1;padding:6px;font-size:13px;">'+p.vent+'</td><td style="border:1px solid #cbd5e1;padding:6px;font-size:13px;">'+p.etco2+'</td><td style="border:1px solid #cbd5e1;padding:6px;font-size:13px;">'+p.expectedAction+'</td></tr>').join('')+'</tbody></table><h2 style="font-size:15px;background:#f1f5f9;padding:4px 8px;margin:0 0 8px 0;border-left:4px solid #3b82f6;">■ 活動時間・メモ</h2><div style="font-size:13px;margin-bottom:4px;"><strong>活動経過時間:</strong> '+fmt(S.time)+'</div><div style="border:1px solid #cbd5e1;padding:8px;white-space:pre-wrap;font-size:13px;background:#f8fafc;min-height:40px;margin-bottom:15px;">'+(fd.freeMemo||'記録なし')+'</div>'+(S.canvasDataUrl?'<h2 style="font-size:15px;background:#f1f5f9;padding:4px 8px;margin:0 0 8px 0;border-left:4px solid #3b82f6;">■ 手書きメモ</h2><div style="border:1px solid #cbd5e1;padding:8px;text-align:center;background:#f8fafc;"><img src="'+S.canvasDataUrl+'" style="max-width:100%;max-height:250px;object-fit:contain;"/></div>':'')+'</div><div style="width:500px;flex-shrink:0;"><h2 style="font-size:15px;background:#f1f5f9;padding:4px 8px;margin:0 0 8px 0;border-left:4px solid #3b82f6;">■ 評価チェックリスト結果</h2>'+ck+'<div style="text-align:center;margin-top:20px;padding:15px;border:2px solid #333;border-radius:8px;"><div style="font-size:13px;font-weight:bold;">達成率 (○の割合)</div><div style="font-size:28px;font-weight:bold;">'+rate+'%</div></div></div></div>';document.body.appendChild(con);try{await new Promise(r=>setTimeout(r,500));const cv=await window.html2canvas(con,{scale:2,useCORS:true,logging:false});const img=cv.toDataURL('image/png');const pdf=new jsPDF('l','mm','a4');const pw=pdf.internal.pageSize.getWidth(),ph=pdf.internal.pageSize.getHeight();let fw=pw,fh=(cv.height*pw)/cv.width;if(fh>ph){fh=ph;fw=(cv.width*ph)/cv.height;}pdf.addImage(img,'PNG',(pw-fw)/2,0,fw,fh);pdf.save('訓練記録_'+new Date().toISOString().slice(0,10).replace(/-/g,'')+'.pdf');closeConfirm();}catch(e){console.error(e);showAlert('PDFの生成に失敗しました。');}finally{document.body.removeChild(con);}}
function resetAll(){showConfirm('すべての記録をリセットしますか？',()=>location.reload());}
function showConfirm(msg,cb){confCB=cb;document.getElementById('confirm-msg').textContent=msg;document.getElementById('confirm-cancel').style.display='';document.getElementById('confirm-ok').style.background='#dc2626';document.getElementById('modal-confirm').style.display='flex';}
function showAlert(msg){confCB=null;document.getElementById('confirm-msg').textContent=msg;document.getElementById('confirm-cancel').style.display='none';document.getElementById('confirm-ok').style.background='#2563eb';document.getElementById('modal-confirm').style.display='flex';}
function closeConfirm(){document.getElementById('modal-confirm').style.display='none';confCB=null;}
function confirmOK(){if(confCB)confCB();closeConfirm();}
function showPrompt(t,d,cb){promCB=cb;document.getElementById('prompt-title').textContent=t;document.getElementById('prompt-input').value=d;document.getElementById('modal-prompt').style.display='flex';setTimeout(()=>document.getElementById('prompt-input').focus(),100);}
function closePrompt(){document.getElementById('modal-prompt').style.display='none';promCB=null;}
function promptOK(){const v=document.getElementById('prompt-input').value;if(promCB)promCB(v);closePrompt();}
</script>
</body>
