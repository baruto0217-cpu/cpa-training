<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CPA Training">
<meta name="theme-color" content="#0f172a">
<title>CPA Training — 愛知県第18版</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/lucide-react@0.383.0/dist/umd/lucide-react.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:100%;height:100%;overflow:hidden;background:#0f172a;}
  body{font-family:'Noto Sans JP',sans-serif;}
  #root{width:100%;height:100%;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState,useRef,useEffect}=React;
const {Activity,Eraser,PenTool,Download,Layout,FileText,CheckCircle2,AlertCircle,Play,Pause,Timer,PlusCircle,X,Save,FolderOpen,Trash2,FileDown,FileUp,ClipboardList,RotateCcw}=LucideReact;

const LS="cpa_v8";
const gS=()=>{try{return JSON.parse(localStorage.getItem(LS)||"[]");}catch{return[];}};
const sS=a=>{try{localStorage.setItem(LS,JSON.stringify(a));}catch{}};

const PL=["初期","P1終了","P2終了","P3終了","P4終了","P5終了"];
const IR={dispatch:"",age:"",sex:"男",witness:"有",pmh:"",cause:"",hospital:"",periods:Array(6).fill(null).map(()=>({rhythm:"",notes:"",vent:"",etco2:"",expectedAction:""})),freeMemo:""};
const IC=[{id:"cp",title:"接触前",items:[]},{id:"c1",title:"1ピリオド",items:[]},{id:"c2",title:"2ピリオド",items:[]},{id:"c3",title:"3ピリオド",items:[]},{id:"c4",title:"4ピリオド",items:[]},{id:"c5",title:"5ピリオド",items:[]}];

const inp={width:"100%",border:"1px solid #cbd5e1",borderRadius:6,padding:"5px 7px",fontSize:16,outline:"none",fontFamily:"inherit",color:"#1e293b",background:"#fff"};

function HBtn({onClick,children,col="ghost"}){const bg=col==="blue"?"#2563eb":col==="green"?"#059669":col==="red"?"#dc2626":"rgba(255,255,255,0.12)";return React.createElement("button",{onClick,style:{display:"flex",alignItems:"center",gap:4,padding:"5px 9px",borderRadius:7,fontSize:11,fontWeight:700,border:"none",background:bg,color:"#fff",cursor:"pointer",height:30,whiteSpace:"nowrap",fontFamily:"inherit",flexShrink:0,lineHeight:1}},children);}
function TabBtn({k,icon,label,activeTab,setTab}){return React.createElement("button",{onClick:()=>setTab(k),style:{display:"flex",alignItems:"center",gap:5,padding:"7px 14px",fontSize:11,fontWeight:700,background:"transparent",border:"none",borderBottom:`2px solid ${activeTab===k?"#3b82f6":"transparent"}`,color:activeTab===k?"#60a5fa":"#94a3b8",cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}},icon,label);}
function FL({t,children}){return React.createElement("div",{style:{marginBottom:6}},React.createElement("div",{style:{fontSize:9,fontWeight:800,letterSpacing:"0.08em",textTransform:"uppercase",color:"#64748b",marginBottom:2}},t),children);}

function App(){
  const [tab,setTab]=useState("scenario");
  const [rec,setRec]=useState(IR);
  const [cats,setCats]=useState(IC);
  const [ev,setEv]=useState({});
  const [em,setEm]=useState(false);
  const [saved,setSaved]=useState(gS);
  const [rm,setRm]=useState(false);
  const [cf,setCf]=useState({open:false,msg:"",cb:null,al:false});
  const [pr,setPr]=useState({open:false,title:"",def:"",cb:null});
  const [time,setTime]=useState(0);
  const [run,setRun]=useState(false);
  const [metro,setMetro]=useState(false);
  const [bpm,setBpm]=useState(110);
  const [cvUrl,setCvUrl]=useState(null);
  const [drawing,setDrawing]=useState(false);
  const [isLS,setIsLS]=useState(()=>window.innerWidth>window.innerHeight);
  const tRef=useRef();const aRef=useRef();const fRef=useRef();
  const cSRef=useRef();const cRRef=useRef();
  const tabRef=useRef(tab);const cvRef=useRef(cvUrl);

  useEffect(()=>{const u=()=>setIsLS(window.innerWidth>window.innerHeight);window.addEventListener("resize",u);window.addEventListener("orientationchange",()=>setTimeout(u,150));return()=>window.removeEventListener("resize",u);},[]);
  useEffect(()=>{if(run)tRef.current=setInterval(()=>setTime(t=>t+1),1000);else clearInterval(tRef.current);return()=>clearInterval(tRef.current);},[run]);
  const fmt=s=>`${String(Math.floor(s/60)).padStart(2,"0")}分${String(s%60).padStart(2,"0")}秒`;
  const lap=()=>setRec(r=>({...r,freeMemo:r.freeMemo+(r.freeMemo?"\n":"")+"記録時間: "+fmt(time)}));

  const pClick=()=>{if(!aRef.current)return;const ctx=aRef.current,o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=880;o.type="sine";g.gain.setValueAtTime(1,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.1);o.start(ctx.currentTime);o.stop(ctx.currentTime+0.1);};
  const togM=()=>{if(!aRef.current)aRef.current=new(window.AudioContext||window.webkitAudioContext)();if(aRef.current.state==="suspended")aRef.current.resume();setMetro(v=>!v);};
  useEffect(()=>{if(!metro)return;if(!aRef.current)aRef.current=new(window.AudioContext||window.webkitAudioContext)();if(aRef.current.state==="suspended")aRef.current.resume();pClick();const id=setInterval(pClick,60000/bpm);return()=>clearInterval(id);},[metro,bpm]);

  useEffect(()=>{tabRef.current=tab;},[tab]);
  useEffect(()=>{cvRef.current=cvUrl;},[cvUrl]);

  const sync=()=>{
    const isS=tabRef.current==="scenario";
    const ref=isS?cSRef:cRRef;
    const c=ref.current;if(!c)return;
    const p=c.parentElement;if(!p||!p.clientWidth)return;
    c.width=p.clientWidth;c.height=isS?140:(p.clientHeight||400);
    const ctx=c.getContext("2d");ctx.lineCap="round";ctx.lineWidth=3;ctx.strokeStyle="#1e293b";
    ctx.clearRect(0,0,c.width,c.height);
    const url=cvRef.current;
    if(url){const img=new Image();img.onload=()=>ctx.drawImage(img,0,0,c.width,c.height);img.src=url;}
  };
  useEffect(()=>{setTimeout(sync,80);},[tab]);
  useEffect(()=>{setTimeout(sync,80);},[cvUrl]);

  /* 手書き：useEffectでcanvasに直接イベント登録（passive:false必須） */
  const drawingRef=useRef(false);
  const attachCanvas=(ref)=>{
    const c=ref.current;if(!c)return ()=>{};
    const getXY=(e)=>{
      const r=c.getBoundingClientRect(),sx=c.width/r.width,sy=c.height/r.height;
      const t=e.touches?e.touches[0]:e;
      return{x:(t.clientX-r.left)*sx,y:(t.clientY-r.top)*sy};
    };
    const onStart=(e)=>{
      e.preventDefault();
      const{x,y}=getXY(e);
      const ctx=c.getContext("2d");
      ctx.lineCap="round";ctx.lineJoin="round";ctx.lineWidth=3;ctx.strokeStyle="#1e293b";
      ctx.beginPath();ctx.moveTo(x,y);
      drawingRef.current=true;
    };
    const onMove=(e)=>{
      if(!drawingRef.current)return;
      e.preventDefault();
      const{x,y}=getXY(e);
      const ctx=c.getContext("2d");
      ctx.lineTo(x,y);ctx.stroke();
    };
    const onEnd=()=>{
      if(!drawingRef.current)return;
      drawingRef.current=false;
      setCvUrl(c.toDataURL());
    };
    c.addEventListener("mousedown",onStart);
    c.addEventListener("mousemove",onMove);
    c.addEventListener("mouseup",onEnd);
    c.addEventListener("mouseleave",onEnd);
    c.addEventListener("touchstart",onStart,{passive:false});
    c.addEventListener("touchmove",onMove,{passive:false});
    c.addEventListener("touchend",onEnd);
    return()=>{
      c.removeEventListener("mousedown",onStart);
      c.removeEventListener("mousemove",onMove);
      c.removeEventListener("mouseup",onEnd);
      c.removeEventListener("mouseleave",onEnd);
      c.removeEventListener("touchstart",onStart);
      c.removeEventListener("touchmove",onMove);
      c.removeEventListener("touchend",onEnd);
    };
  };
  useEffect(()=>attachCanvas(cSRef),[]);
  useEffect(()=>attachCanvas(cRRef),[]);

  const clrCv=()=>showC("手書き内容を消去しますか？",()=>{[cSRef,cRRef].forEach(r=>{const c=r.current;if(c)c.getContext("2d").clearRect(0,0,c.width,c.height);});setCvUrl(null);});

  const showC=(msg,cb,al=false)=>setCf({open:true,msg,cb,al});
  const showA=msg=>setCf({open:true,msg,cb:null,al:true});
  const closeC=()=>setCf({open:false,msg:"",cb:null,al:false});
  const showP=(title,def,cb)=>setPr({open:true,title,def,cb});
  const closeP=()=>setPr({open:false,title:"",def:"",cb:null});

  const saveRec=()=>{const def=rec.dispatch||new Date().toLocaleDateString()+"の記録";showP("保存する記録の名前を入力してください",def,name=>{const e={id:Date.now().toString(),name,timestamp:Date.now(),rec,cats,ev,time,cvUrl};const u=[e,...saved];setSaved(u);sS(u);setTimeout(()=>showA("記録を保存しました。"),300);});};
  const loadRec=data=>showC("現在の編集内容を破棄して読み込みますか？",()=>{setRec(data.rec||IR);setCats(data.cats||IC);setEv(data.ev||{});setTime(data.time||0);setCvUrl(data.cvUrl||null);setRm(false);setTimeout(()=>showA("データを読み込みました。"),300);});
  const delRec=id=>showC("この記録を削除しますか？",()=>{const u=saved.filter(r=>r.id!==id);setSaved(u);sS(u);});
  const expD=()=>{try{const b=new Blob([JSON.stringify({rec,cats,ev,time,cvUrl},null,2)],{type:"text/plain"});const u=URL.createObjectURL(b),a=document.createElement("a");a.href=u;a.download=`CPA_${new Date().toISOString().slice(0,10).replace(/-/g,"")}.txt`;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);showA("保存しました。");}catch{showA("書き出しに失敗しました。");}};
  const impF=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.rec&&d.cats)showC("ファイルからデータを読み込みますか？",()=>{setRec(d.rec);setCats(d.cats);setEv(d.ev||{});setTime(d.time||0);setCvUrl(d.cvUrl||null);showA("復元しました。");});else showA("無効なデータ形式です。");}catch{showA("読み込みに失敗しました。");}e.target.value=null;};r.readAsText(f);};

  const ldSc=src=>new Promise((res,rej)=>{if(document.querySelector(`script[src="${src}"]`)){res();return;}const s=document.createElement("script");s.src=src;s.onload=res;s.onerror=rej;document.head.appendChild(s);});
  const expPDF=async()=>{showA("PDFを作成しています...");try{await ldSc("https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js");await ldSc("https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js");}catch{showA("ライブラリ読み込みに失敗しました。");return;}const{jsPDF}=window.jspdf;const oC=cats.reduce((s,c)=>s+c.items.filter(i=>ev[i.id]==="O").length,0);const tot=cats.reduce((s,c)=>s+c.items.length,0);const rate=tot===0?0:Math.round((oC/tot)*100);let ck="";cats.forEach(cat=>{ck+=`<h3 style="font-size:13px;margin:8px 0 3px;">【${cat.title}】</h3>`;cat.items.forEach(item=>{const st=ev[item.id];const m=st==="O"?'<b style="color:#16a34a">○</b>':st==="X"?'<b style="color:#dc2626">×</b>':'<span style="color:#94a3b8">-</span>';ck+=`<div style="display:flex;gap:6px;font-size:12px;margin-bottom:3px;">${m}<span>${item.label}</span></div>`;});});const con=document.createElement("div");con.style.cssText="position:absolute;left:-9999px;top:0;width:1400px;background:#fff;padding:30px;font-family:'Noto Sans JP',sans-serif;color:#333;";con.innerHTML=`<h1 style="font-size:22px;border-bottom:2px solid #333;padding-bottom:8px;margin:0 0 10px;">救急活動訓練シミュレーション記録</h1><div style="text-align:right;font-size:12px;margin-bottom:15px;">出力日時: ${new Date().toLocaleString()}</div><div style="display:flex;gap:30px;"><div style="flex:1;"><h2 style="font-size:14px;background:#f1f5f9;padding:4px 8px;margin:0 0 8px;border-left:4px solid #3b82f6;">■ 傷病者情報</h2><div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px;font-size:13px;"><div><b>指令内容:</b> ${rec.dispatch}</div><div><b>年齢/性別:</b> ${rec.age}/${rec.sex}</div><div><b>目撃:</b> ${rec.witness}</div><div><b>原因:</b> ${rec.cause}</div><div><b>既往歴:</b> ${rec.pmh}</div><div><b>かかりつけ:</b> ${rec.hospital}</div></div><h2 style="font-size:14px;background:#f1f5f9;padding:4px 8px;margin:0 0 8px;border-left:4px solid #3b82f6;">■ ピリオド経過</h2><table style="width:100%;border-collapse:collapse;margin-bottom:14px;"><thead><tr>${["時期","波形","特記事項","換気","ETCO2","予想活動"].map(h=>`<th style="border:1px solid #cbd5e1;padding:5px;font-size:12px;background:#f8fafc;">${h}</th>`).join("")}</tr></thead><tbody>${rec.periods.map((p,i)=>`<tr>${[PL[i],p.rhythm,p.notes,p.vent,p.etco2,p.expectedAction].map(v=>`<td style="border:1px solid #cbd5e1;padding:5px;font-size:12px;">${v||""}</td>`).join("")}</tr>`).join("")}</tbody></table><h2 style="font-size:14px;background:#f1f5f9;padding:4px 8px;margin:0 0 8px;border-left:4px solid #3b82f6;">■ 活動時間・メモ</h2><div style="font-size:13px;margin-bottom:4px;"><b>経過時間:</b> ${fmt(time)}</div><div style="border:1px solid #cbd5e1;padding:8px;white-space:pre-wrap;font-size:12px;background:#f8fafc;min-height:36px;margin-bottom:14px;">${rec.freeMemo||"記録なし"}</div></div><div style="width:480px;flex-shrink:0;"><h2 style="font-size:14px;background:#f1f5f9;padding:4px 8px;margin:0 0 8px;border-left:4px solid #3b82f6;">■ 評価チェックリスト</h2>${ck}<div style="text-align:center;margin-top:18px;padding:14px;border:2px solid #333;border-radius:8px;"><div style="font-size:12px;font-weight:bold;">達成率</div><div style="font-size:26px;font-weight:bold;">${rate}%</div></div></div></div>`;document.body.appendChild(con);try{await new Promise(r=>setTimeout(r,500));const cv=await window.html2canvas(con,{scale:2,useCORS:true,logging:false});const img=cv.toDataURL("image/png");const pdf=new jsPDF("l","mm","a4");const pw=pdf.internal.pageSize.getWidth(),ph=pdf.internal.pageSize.getHeight();let fw=pw,fh=(cv.height*pw)/cv.width;if(fh>ph){fh=ph;fw=(cv.width*ph)/cv.height;}pdf.addImage(img,"PNG",(pw-fw)/2,0,fw,fh);pdf.save(`訓練記録_${new Date().toISOString().slice(0,10).replace(/-/g,"")}.pdf`);closeC();}catch(e){console.error(e);showA("PDF生成に失敗しました。");}finally{document.body.removeChild(con);}};

  const utitle=(ci,t)=>setCats(cs=>cs.map((c,i)=>i===ci?{...c,title:t}:c));
  const ulabel=(ci,ii,t)=>setCats(cs=>cs.map((c,i)=>i===ci?{...c,items:c.items.map((it,j)=>j===ii?{...it,label:t}:it)}:c));
  const addI=ci=>setCats(cs=>cs.map((c,i)=>i===ci?{...c,items:[...c.items,{id:"i"+Date.now(),label:""}]}:c));
  const rmI=(ci,ii)=>showC("この項目を削除しますか？",()=>setCats(cs=>cs.map((c,i)=>i===ci?{...c,items:c.items.filter((_,j)=>j!==ii)}:c)));
  const addC=()=>setCats(cs=>[...cs,{id:"c"+Date.now(),title:"",items:[]}]);
  const rmC=ci=>showC("この大項目を削除しますか？",()=>setCats(cs=>cs.filter((_,i)=>i!==ci)));
  const setE=(id,v)=>setEv(p=>({...p,[id]:p[id]===v?undefined:v}));
  const cycE=id=>{if(em)return;setEv(p=>{const c=p[id];if(c==="O")return{...p,[id]:"X"};if(c==="X")return{...p,[id]:undefined};return{...p,[id]:"O"};});};
  const setP=(i,f,v)=>setRec(r=>({...r,periods:r.periods.map((p,idx)=>idx===i?{...p,[f]:v}:p)}));
  const reset=()=>showC("すべての記録をリセットしますか？",()=>window.location.reload());
  const tot=cats.reduce((s,c)=>s+c.items.length,0);
  const oC=cats.reduce((s,c)=>s+c.items.filter(i=>ev[i.id]==="O").length,0);
  const rate=tot===0?0:Math.round((oC/tot)*100);

  return (
    <div style={{fontFamily:"'Noto Sans JP',sans-serif",background:"#f1f5f9",color:"#1e293b",position:"fixed",inset:0,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <style>{`
  *{-webkit-tap-highlight-color:transparent;box-sizing:border-box;}
  canvas{touch-action:none;cursor:crosshair;}
  .ht{display:none!important;}
  ::-webkit-scrollbar{width:3px;}
  ::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:2px;}
  button:active{opacity:0.7;}
  @media(orientation:landscape){
    .lsc-hdr{padding:3px 10px!important;}
    .lsc-tab{padding:5px 12px!important;}
    .lsc-main{padding:5px!important;}
    .lsc-gap{gap:5px!important;}
  }
`}</style>

      {/* ヘッダー */}
      <div style={{background:"#0f172a",color:"#fff",flexShrink:0}}>
        <div className="lsc-hdr" style={{display:"flex",alignItems:"center",padding:"5px 10px",borderBottom:"1px solid #1e293b",gap:6,overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
          <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
            <div style={{background:"#dc2626",borderRadius:7,padding:"4px 6px",display:"flex"}}><Activity size={15}/></div>
            <div style={{flexShrink:0}}><div style={{fontSize:12,fontWeight:900,letterSpacing:"0.06em",whiteSpace:"nowrap"}}>CPA TRAINING</div><div style={{fontSize:9,color:"#64748b"}}>愛知県第18版</div></div>
          </div>
          <div style={{flex:1,minWidth:4}}/>
          <div style={{display:"flex",alignItems:"center",gap:4,flexShrink:0}}>
            <HBtn onClick={()=>setRm(true)}><FolderOpen size={11}/>記録一覧</HBtn>
            <HBtn onClick={saveRec} col="blue"><Save size={11}/>保存</HBtn>
            <div style={{width:1,height:18,background:"#334155"}}/>
            <input type="file" ref={fRef} style={{display:"none"}} accept=".txt,.json" onChange={impF}/>
            <HBtn onClick={()=>fRef.current.click()}><FileUp size={11}/>読込</HBtn>
            <HBtn onClick={expD}><FileDown size={11}/>書出</HBtn>
            <div style={{width:1,height:18,background:"#334155"}}/>
            <HBtn onClick={expPDF} col="green"><Download size={11}/>PDF出力</HBtn>
            <HBtn onClick={reset}><RotateCcw size={11}/>リセット</HBtn>
          </div>
        </div>
        <div className="lsc-tab" style={{display:"flex",padding:"0 10px",background:"#1e293b"}}>
          <TabBtn k="scenario" icon={<Layout size={12}/>} label="想定票（入力）" activeTab={tab} setTab={setTab}/>
          <TabBtn k="result" icon={<FileText size={12}/>} label="結果レポート" activeTab={tab} setTab={setTab}/>
        </div>
      </div>

      {/* メイン */}
      <div className="lsc-main" style={{flex:1,minHeight:0,overflow:"hidden",padding:8,boxSizing:"border-box",display:"flex",flexDirection:"column"}}>

        {/* 想定票 */}
        <div className={`lsc-gap ${tab!=="scenario"?"ht":""}`} style={{display:"flex",flex:1,minHeight:0,gap:8}}>

          {/* 左 */}
          <div style={{flex:1,minHeight:0,display:"flex",flexDirection:"column",background:"#fff",borderRadius:10,border:"1px solid #e2e8f0",overflow:"hidden"}}>
            <div style={{padding:"6px 12px",borderBottom:"1px solid #e2e8f0",display:"flex",alignItems:"center",gap:6,background:"#f8fafc",flexShrink:0}}>
              <ClipboardList size={13} color="#2563eb"/>
              <span style={{fontWeight:800,fontSize:12}}>活動記録・傷病者情報</span>
            </div>
            {/* 上部固定（縦）／横向きは maxHeight で制限しスクロール */}
            <div style={{flexShrink:0,overflowY:isLS?"auto":"visible",WebkitOverflowScrolling:"touch",maxHeight:isLS?"55%":"none",padding:"7px 10px 4px",borderBottom:"1px solid #e2e8f0"}}>
              <FL t="指令内容"><input style={inp} value={rec.dispatch} onChange={e=>setRec(r=>({...r,dispatch:e.target.value}))}/></FL>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:6}}>
                <FL t="年齢"><input style={inp} value={rec.age} onChange={e=>setRec(r=>({...r,age:e.target.value}))}/></FL>
                <FL t="性別"><select style={{...inp,background:"#fff"}} value={rec.sex} onChange={e=>setRec(r=>({...r,sex:e.target.value}))}><option>男</option><option>女</option></select></FL>
                <FL t="目撃"><select style={{...inp,background:"#fff"}} value={rec.witness} onChange={e=>setRec(r=>({...r,witness:e.target.value}))}><option>有</option><option>無</option></select></FL>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:6}}>
                <FL t="原因(推定)"><input style={inp} value={rec.cause} onChange={e=>setRec(r=>({...r,cause:e.target.value}))}/></FL>
                <FL t="既往歴"><input style={inp} value={rec.pmh} onChange={e=>setRec(r=>({...r,pmh:e.target.value}))}/></FL>
                <FL t="かかりつけ"><input style={inp} value={rec.hospital} onChange={e=>setRec(r=>({...r,hospital:e.target.value}))}/></FL>
              </div>
              <div style={{border:"1px solid #e2e8f0",borderRadius:9,overflow:"hidden",marginBottom:4}}>
                <div style={{overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
                  <table style={{width:"100%",minWidth:520,borderCollapse:"collapse",fontSize:11}}>
                    <thead><tr style={{background:"#f8fafc"}}>{[["時期",50],["波形",62],["特記事項",100],["換気",52],["ETCO2",52],["予想される活動",110]].map(([h,w])=><th key={h} style={{padding:"4px 4px",fontWeight:700,fontSize:10,color:"#64748b",textAlign:"center",borderBottom:"1px solid #e2e8f0",borderRight:"1px solid #e2e8f0",minWidth:w,whiteSpace:"nowrap"}}>{h}</th>)}</tr></thead>
                    <tbody>{rec.periods.map((p,i)=><tr key={i} style={{borderBottom:"1px solid #f1f5f9"}}>
                      <td style={{padding:"3px 5px",fontWeight:700,fontSize:10,color:"#94a3b8",background:"#f8fafc",textAlign:"center",whiteSpace:"nowrap",borderRight:"1px solid #e2e8f0"}}>{PL[i]}</td>
                      <td style={{padding:3,borderRight:"1px solid #f1f5f9"}}><select style={{width:"100%",border:"none",background:"transparent",textAlign:"center",fontWeight:700,color:"#2563eb",fontSize:11,outline:"none",fontFamily:"inherit"}} value={p.rhythm} onChange={e=>setP(i,"rhythm",e.target.value)}><option value=""/>{["Vf","VT","PEA","心静止","NSR"].map(v=><option key={v}>{v}</option>)}</select></td>
                      <td style={{padding:3,borderRight:"1px solid #f1f5f9"}}><input style={{width:"100%",border:"none",background:"transparent",fontSize:11,outline:"none",fontFamily:"inherit"}} placeholder="特記事項" value={p.notes} onChange={e=>setP(i,"notes",e.target.value)}/></td>
                      <td style={{padding:3,borderRight:"1px solid #f1f5f9"}}><input style={{width:"100%",border:"none",background:"transparent",textAlign:"center",fontSize:11,outline:"none",fontFamily:"inherit"}} value={p.vent} onChange={e=>setP(i,"vent",e.target.value)}/></td>
                      <td style={{padding:3,borderRight:"1px solid #f1f5f9"}}><input style={{width:"100%",border:"none",background:"transparent",textAlign:"center",fontSize:11,color:"#2563eb",fontWeight:700,outline:"none",fontFamily:"inherit"}} value={p.etco2} onChange={e=>setP(i,"etco2",e.target.value)}/></td>
                      <td style={{padding:3}}><input style={{width:"100%",border:"none",background:"transparent",fontSize:11,outline:"none",fontFamily:"inherit"}} placeholder="例: 気道確保…" value={p.expectedAction} onChange={e=>setP(i,"expectedAction",e.target.value)}/></td>
                    </tr>)}</tbody>
                  </table>
                </div>
              </div>
            </div>{/* /上部固定 */}

            {/* 下部スクロール：タイマー・メモ */}
            <div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch",padding:"8px 10px"}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}><div style={{flex:1,height:1,background:"#e2e8f0"}}/><span style={{fontSize:9,fontWeight:800,color:"#94a3b8",textTransform:"uppercase",letterSpacing:"0.1em",whiteSpace:"nowrap"}}>タイマー・メモ</span><div style={{flex:1,height:1,background:"#e2e8f0"}}/></div>
              <div style={{background:"#0f172a",borderRadius:10,padding:"9px 12px",color:"#fff",marginBottom:8}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                  <div style={{display:"flex",alignItems:"center",gap:9}}>
                    <div style={{background:"#2563eb",borderRadius:7,padding:"5px 6px",display:"flex"}}><Timer size={16}/></div>
                    <div><div style={{fontSize:9,fontWeight:800,color:"#475569",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:1}}>活動経過時間</div><div style={{fontSize:22,fontFamily:"monospace",fontWeight:900,letterSpacing:1}}>{fmt(time)}</div></div>
                  </div>
                  <div style={{display:"flex",gap:7}}>
                    <button onClick={()=>setRun(v=>!v)} style={{width:36,height:36,borderRadius:"50%",border:"none",background:run?"#dc2626":"#16a34a",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>{run?<Pause size={16}/>:<Play size={16}/>}</button>
                    <button onClick={()=>setTime(0)} style={{width:36,height:36,borderRadius:"50%",border:"none",background:"#1e293b",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}><RotateCcw size={14} color="#94a3b8"/></button>
                  </div>
                </div>
                <div style={{borderTop:"1px solid #1e293b",paddingTop:7,display:"flex",alignItems:"center",justifyContent:"space-between",gap:6,flexWrap:"wrap"}}>
                  <div style={{display:"flex",alignItems:"center",gap:5}}><Activity size={11} color="#3b82f6"/><span style={{fontSize:10,fontWeight:700,color:"#94a3b8"}}>メトロノーム（胸骨圧迫テンポ）</span></div>
                  <div style={{display:"flex",alignItems:"center",gap:7}}>
                    <input type="range" min="100" max="120" value={bpm} onChange={e=>setBpm(Number(e.target.value))} style={{width:76,accentColor:"#3b82f6"}}/>
                    <span style={{fontFamily:"monospace",fontSize:10,color:"#64748b",width:50,textAlign:"right"}}>{bpm} BPM</span>
                    <button onClick={togM} style={{padding:"6px 12px",borderRadius:7,fontSize:10,fontWeight:800,background:metro?"#2563eb":"#1e293b",color:metro?"#fff":"#64748b",border:"none",cursor:"pointer",fontFamily:"inherit"}}>{metro?"ON":"OFF"}</button>
                  </div>
                </div>
              </div>
              <button onClick={lap} style={{width:"100%",padding:9,background:"#f1f5f9",border:"1px dashed #cbd5e1",borderRadius:8,color:"#64748b",fontSize:11,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",gap:4,cursor:"pointer",marginBottom:12,fontFamily:"inherit"}}><PlusCircle size={12}/>現在の経過時間をメモに追記</button>
              <FL t="フリーメモ・活動ログ"><textarea style={{...inp,height:82,fontFamily:"monospace",lineHeight:1.6,resize:"none"}} value={rec.freeMemo} onChange={e=>setRec(r=>({...r,freeMemo:e.target.value}))} placeholder="タイマーの記録がここに反映されます..."/></FL>
              <div style={{height:10}}/>
            </div>{/* /下部スクロール */}
          </div>

          {/* 右 */}
          <div style={{width:"40%",minHeight:0,display:"flex",flexDirection:"column",gap:8}}>
            <div style={{flex:"1 1 0",minHeight:0,display:"flex",flexDirection:"column",background:"#fff",borderRadius:10,border:"1px solid #e2e8f0",overflow:"hidden"}}>
              <div style={{background:"#1d4ed8",padding:"8px 10px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
                <div style={{display:"flex",alignItems:"center",gap:5,color:"#fff",fontSize:11,fontWeight:800,textTransform:"uppercase"}}><CheckCircle2 size={13}/>活動評価チェックリスト</div>
                <button onClick={()=>setEm(v=>!v)} style={{fontSize:9,padding:"4px 9px",borderRadius:6,fontWeight:800,background:em?"#fff":"#1e40af",color:em?"#1d4ed8":"#bfdbfe",border:"none",display:"flex",alignItems:"center",gap:3,cursor:"pointer",fontFamily:"inherit",flexShrink:0}}><PenTool size={9}/>{em?"編集完了":"項目を編集"}</button>
              </div>
              <div style={{flex:1,minHeight:0,overflowY:"auto",WebkitOverflowScrolling:"touch"}}>
                {cats.map((cat,ci)=>(
                  <div key={cat.id}>
                    <div style={{background:"#f1f5f9",padding:"5px 10px",borderBottom:"1px solid #e2e8f0",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                      <input style={{background:"transparent",border:"none",outline:"none",fontSize:9,fontWeight:800,letterSpacing:"0.1em",textTransform:"uppercase",color:"#64748b",flex:1,fontFamily:"inherit"}} value={cat.title} readOnly={!em} onChange={e=>utitle(ci,e.target.value)} placeholder={em?"大項目を入力":""}/>
                      {em&&<button onClick={()=>rmC(ci)} style={{background:"none",border:"none",cursor:"pointer",color:"#94a3b8",display:"flex",padding:3}}><X size={12}/></button>}
                    </div>
                    {cat.items.length===0&&!em&&<div style={{padding:"8px 12px",fontSize:10,color:"#94a3b8",textAlign:"center",fontStyle:"italic"}}>項目がありません。「項目を編集」から追加してください。</div>}
                    {cat.items.map((item,ii)=>(
                      <div key={item.id} style={{display:"flex",alignItems:"flex-start",gap:6,padding:"7px 10px",borderBottom:"1px solid rgba(0,0,0,0.03)",background:ev[item.id]==="O"?"#f0fdf4":ev[item.id]==="X"?"#fef2f2":"transparent"}}>
                        <div style={{display:"flex",gap:4,flexShrink:0,marginTop:1}}>
                          {[["O","○","#16a34a"],["X","×","#dc2626"]].map(([v,lbl,col])=>(
                            <button key={v} onClick={()=>setE(item.id,v)} style={{width:26,height:26,borderRadius:"50%",border:`2px solid ${ev[item.id]===v?col:"#cbd5e1"}`,background:ev[item.id]===v?col:"transparent",color:ev[item.id]===v?"#fff":"#cbd5e1",fontSize:12,fontWeight:800,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{lbl}</button>
                          ))}
                        </div>
                        <textarea style={{flex:1,fontSize:11,background:"transparent",border:em?"1px solid #bfdbfe":"none",outline:"none",resize:"none",lineHeight:1.5,fontFamily:"inherit",cursor:em?"text":"pointer",padding:"1px 3px",borderRadius:3,color:ev[item.id]==="O"?"#166534":ev[item.id]==="X"?"#991b1b":"#374151",fontWeight:ev[item.id]?"700":"400"}} value={item.label} rows={1} readOnly={!em} onInput={e=>{e.target.style.height="auto";e.target.style.height=e.target.scrollHeight+"px";}} onChange={e=>ulabel(ci,ii,e.target.value)} onClick={()=>cycE(item.id)} placeholder={em?"評価項目を入力":""}/>
                        {em&&<button onClick={()=>rmI(ci,ii)} style={{background:"none",border:"none",cursor:"pointer",color:"#94a3b8",display:"flex",padding:3,flexShrink:0}}><X size={11}/></button>}
                      </div>
                    ))}
                    {em&&<div style={{padding:"4px 9px"}}><button onClick={()=>addI(ci)} style={{width:"100%",padding:"6px",background:"rgba(37,99,235,0.06)",border:"1px dashed #93c5fd",borderRadius:7,color:"#2563eb",fontSize:9,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:3,fontFamily:"inherit"}}><PlusCircle size={10}/>評価項目を追加</button></div>}
                  </div>
                ))}
                {em&&<div style={{padding:"8px 9px",borderTop:"1px solid #e2e8f0"}}><button onClick={addC} style={{width:"100%",padding:"8px",background:"#f8fafc",border:"1px dashed #cbd5e1",borderRadius:8,color:"#64748b",fontSize:10,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:4,fontFamily:"inherit"}}><PlusCircle size={11}/>大項目（カテゴリ）を追加</button></div>}
              </div>
            </div>
            <div style={{flexShrink:0,background:"#fff",borderRadius:10,border:"1px solid #e2e8f0",padding:8}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
                <span style={{fontSize:9,fontWeight:800,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.1em",display:"flex",alignItems:"center",gap:3}}><PenTool size={9}/>手書きメモ</span>
                <button onClick={clrCv} style={{background:"none",border:"none",cursor:"pointer",color:"#94a3b8",display:"flex",padding:2}}><Eraser size={13}/></button>
              </div>
              <div style={{border:"1px solid #e2e8f0",borderRadius:7,height:isLS?70:110,overflow:"hidden"}}>
                <canvas ref={cSRef} style={{width:"100%",height:"100%",display:"block"}} />
              </div>
            </div>
          </div>
        </div>

        {/* 結果レポート */}
        <div className={`lsc-gap ${tab!=="result"?"ht":""}`} style={{display:"flex",flex:1,minHeight:0,gap:8}}>
          <div style={{width:"33%",minHeight:0,display:"flex",flexDirection:"column",background:"#fff",borderRadius:10,border:"1px solid #e2e8f0",overflow:"hidden"}}>
            <div style={{background:"#1e293b",padding:"8px 12px",display:"flex",alignItems:"center",gap:6,flexShrink:0}}><AlertCircle size={13} color="#f87171"/><span style={{color:"#fff",fontWeight:800,fontSize:11}}>要改善項目 (×判定)</span></div>
            <div style={{flex:1,minHeight:0,overflowY:"auto",WebkitOverflowScrolling:"touch",padding:12,display:"flex",flexDirection:"column"}}>
              <div style={{flex:1}}>{cats.reduce((a,c)=>a+c.items.filter(i=>ev[i.id]==="X").length,0)===0?(<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:120,color:"#94a3b8"}}><CheckCircle2 size={34} color="rgba(34,197,94,0.3)"/><p style={{fontSize:11,fontWeight:700,marginTop:7}}>×判定された項目はありません</p></div>):cats.map(cat=>{const xs=cat.items.filter(i=>ev[i.id]==="X");if(!xs.length)return null;return<div key={cat.id} style={{marginBottom:12}}><div style={{fontSize:9,fontWeight:800,color:"#64748b",textTransform:"uppercase",borderBottom:"1px solid #f1f5f9",paddingBottom:3,marginBottom:5}}>{cat.title}</div>{xs.map(item=><div key={item.id} style={{display:"flex",gap:6,padding:"2px 0"}}><span style={{color:"#ef4444",fontWeight:800,fontSize:13,width:14,textAlign:"center",flexShrink:0}}>×</span><span style={{fontSize:11,color:"#991b1b",fontWeight:700,lineHeight:1.5}}>{item.label}</span></div>)}</div>;})}</div>
              <div style={{marginTop:14,padding:"14px",background:"#0f172a",borderRadius:12,textAlign:"center",flexShrink:0}}>
                <div style={{fontSize:9,fontWeight:800,color:"#475569",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:4}}>達成率 (○の割合)</div>
                <div style={{fontSize:44,fontWeight:900,fontFamily:"monospace",color:rate>=80?"#34d399":rate>=60?"#fbbf24":"#f87171",letterSpacing:2,lineHeight:1}}>{rate}%</div>
                <div style={{fontSize:11,color:"#475569",marginTop:4}}>{oC} / {tot} 項目達成</div>
              </div>
            </div>
          </div>
          <div style={{flex:1,minHeight:0,display:"flex",flexDirection:"column",background:"#fff",borderRadius:10,border:"1px solid #e2e8f0",overflow:"hidden"}}>
            <div style={{background:"#1e293b",padding:"8px 12px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
              <div style={{display:"flex",alignItems:"center",gap:5,color:"#fff",fontSize:11,fontWeight:800,textTransform:"uppercase"}}><PenTool size={12} color="#60a5fa"/>手書きメモ・フィードバック</div>
              <button onClick={clrCv} style={{display:"flex",alignItems:"center",gap:3,background:"rgba(255,255,255,0.07)",border:"1px solid #334155",borderRadius:6,padding:"4px 9px",color:"#94a3b8",fontSize:10,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}><Eraser size={11}/>クリア</button>
            </div>
            <div style={{flex:1,minHeight:0,padding:12,display:"flex",flexDirection:"column",overflow:"hidden"}}>
              <div style={{flex:1,minHeight:0,background:"#fff",borderRadius:14,overflow:"hidden",border:"2px solid #f1f5f9"}}>
                <canvas ref={cRRef} style={{width:"100%",height:"100%",display:"block"}} />
              </div>
              <div style={{marginTop:7,display:"flex",justifyContent:"space-between",fontSize:9,fontWeight:700,color:"#cbd5e1",fontStyle:"italic"}}><span>※想定票タブの内容が自動で同期されます</span><span>愛知県救急隊シミュレーション記録</span></div>
            </div>
          </div>
        </div>
      </div>

      {rm&&<div style={{position:"fixed",inset:0,zIndex:60,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,0.55)"}}><div style={{background:"#fff",borderRadius:14,padding:20,width:"min(560px,92vw)",maxHeight:"82vh",display:"flex",flexDirection:"column",boxShadow:"0 20px 50px rgba(0,0,0,0.3)"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><h3 style={{fontSize:14,fontWeight:800,color:"#1e293b",display:"flex",alignItems:"center",gap:6}}><FolderOpen size={15} color="#64748b"/>保存された記録一覧</h3><button onClick={()=>setRm(false)} style={{background:"none",border:"none",cursor:"pointer",color:"#94a3b8",display:"flex"}}><X size={20}/></button></div><div style={{overflowY:"auto",flex:1}}>{saved.length===0?<div style={{textAlign:"center",color:"#94a3b8",padding:"32px 0",fontSize:12}}>保存された記録はありません</div>:saved.map(r=><div key={r.id} style={{border:"1px solid #e2e8f0",borderRadius:9,padding:"10px 12px",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}><div><div style={{fontSize:10,color:"#94a3b8",marginBottom:2}}>{new Date(r.timestamp).toLocaleString()}</div><div style={{fontWeight:700,fontSize:13,color:"#1e293b"}}>{r.name||r.rec&&r.rec.dispatch||"無題の記録"}</div></div><div style={{display:"flex",gap:6}}><button onClick={()=>loadRec(r)} style={{padding:"7px 13px",background:"#eff6ff",color:"#1d4ed8",border:"none",borderRadius:7,fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>読み込む</button><button onClick={()=>delRec(r.id)} style={{padding:6,background:"transparent",border:"none",cursor:"pointer",color:"#94a3b8",display:"flex"}}><Trash2 size={14}/></button></div></div>)}</div></div></div>}
      {cf.open&&<div style={{position:"fixed",inset:0,zIndex:70,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,0.55)"}}><div style={{background:"#fff",borderRadius:12,padding:22,width:"min(300px,88vw)",boxShadow:"0 20px 50px rgba(0,0,0,0.3)"}}><p style={{fontSize:13,fontWeight:600,color:"#1e293b",textAlign:"center",marginBottom:20,whiteSpace:"pre-wrap",lineHeight:1.7}}>{cf.msg}</p><div style={{display:"flex",justifyContent:"center",gap:10}}>{!cf.al&&<button onClick={closeC} style={{padding:"9px 20px",fontSize:12,fontWeight:700,color:"#64748b",background:"#f1f5f9",border:"none",borderRadius:9,cursor:"pointer",fontFamily:"inherit"}}>キャンセル</button>}<button onClick={()=>{cf.cb&&cf.cb();closeC();}} style={{padding:"9px 20px",fontSize:12,fontWeight:700,color:"#fff",background:cf.al?"#2563eb":"#dc2626",border:"none",borderRadius:9,cursor:"pointer",fontFamily:"inherit"}}>OK</button></div></div></div>}
      {pr.open&&<div style={{position:"fixed",inset:0,zIndex:70,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,0.55)"}}><div style={{background:"#fff",borderRadius:12,padding:22,width:"min(360px,90vw)",boxShadow:"0 20px 50px rgba(0,0,0,0.3)"}}><h3 style={{fontSize:13,fontWeight:700,color:"#1e293b",marginBottom:10}}>{pr.title}</h3><input id="pi" type="text" autoFocus defaultValue={pr.def} style={{...inp,marginBottom:16}} onKeyDown={e=>{if(e.key==="Enter"){pr.cb&&pr.cb(e.target.value);closeP();}}}/><div style={{display:"flex",justifyContent:"flex-end",gap:7}}><button onClick={closeP} style={{padding:"9px 16px",fontSize:12,fontWeight:700,color:"#64748b",background:"#f1f5f9",border:"none",borderRadius:9,cursor:"pointer",fontFamily:"inherit"}}>キャンセル</button><button onClick={()=>{const v=document.getElementById("pi").value;pr.cb&&pr.cb(v);closeP();}} style={{padding:"9px 16px",fontSize:12,fontWeight:700,color:"#fff",background:"#2563eb",border:"none",borderRadius:9,cursor:"pointer",fontFamily:"inherit"}}>保存</button></div></div></div>}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
